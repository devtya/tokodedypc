name: tokodedypc
description: "Aplikasi Kasir Toko Sembako - Versi Desktop PC"
publish_to: 'none'
version: 1.0.5+6

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Local Database
  drift: ^2.25.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Dependency Injection
  get_it: ^8.0.3

  # Utility
  intl: ^0.20.2
  package_info_plus: ^8.0.0
  http: ^1.2.0
  # open_filex: ^4.4.0

  # Barcode Scanner (manual input for Windows - no camera)
  # mobile_scanner: ^6.0.7
  shared_preferences: ^2.5.5

  # Printing (Thermal Printer) — Network (HTTP) only on Windows
  # flutter_blue_plus: ^1.35.3

  # Backup & Restore (Legacy Excel — will be replaced by Supabase sync)
  excel: ^4.0.0
  file_picker: ^8.1.0
  share_plus: ^10.1.0
  permission_handler: ^11.3.0

  # Supabase Sync
  supabase_flutter: ^2.8.4
  uuid: ^4.5.1
  connectivity_plus: ^6.1.4
  device_info_plus: ^11.0.0
  crypto: ^3.0.0
  local_auth: ^2.3.0
  fpdart: ^1.2.0
  injectable: ^3.0.0
  freezed_annotation: ^3.1.0
  # workmanager: ^0.9.0+3
  slang: ^4.15.0
  slang_flutter: ^4.15.0
  flutter_localizations:
    sdk: flutter
  image_picker: ^1.2.2
  # flutter_image_compress: ^2.4.0
  fl_chart: ^1.2.0
  shimmer: ^3.0.0
  pdf: ^3.12.0
  printing: ^5.14.3
  google_fonts: ^6.1.0
  flutter_image_compress: ^2.4.0
  flutter_pos_printer_platform_image_3: ^1.2.4
  esc_pos_utils_plus: ^2.0.4
  archive: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.15
  drift_dev: ^2.25.2
  injectable_generator: ^3.0.2
  freezed: ^3.2.5
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
