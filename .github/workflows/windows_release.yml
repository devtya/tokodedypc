name: Build Windows Desktop Release

on:
  push:
    branches: [ "master", "main" ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.x'

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows Release
        run: flutter build windows --release --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"

      - name: Zip Release
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath tokodedypc-windows.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tokodedypc-windows
          path: tokodedypc-windows.zip

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: tokodedypc-windows.zip
